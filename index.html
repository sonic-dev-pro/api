<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز APIs - Sonic API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border-color: rgba(255,255,255,0.06);
            --border-hover: rgba(118,75,162,0.5);
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-muted: #5a5a7a;
            --accent-1: #667eea;
            --accent-2: #764ba2;
            --accent-3: #f093fb;
            --accent-4: #4facfe;
            --success: #00e676;
            --warning: #ffab40;
            --danger: #ff5252;
            --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --font-main: 'Tajawal', sans-serif;
            --header-height: 70px;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--header-height);
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-brand .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .nav-status {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-status .dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .hero {
            padding: 40px 0 30px;
            text-align: center;
        }
        .hero-icon {
            font-size: 56px;
            margin-bottom: 10px;
        }
        .hero-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 900;
        }
        .hero-title .gradient-text {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 10px auto 30px;
        }
        .search-container {
            max-width: 550px;
            margin: 0 auto;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-main);
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: var(--accent-1);
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .stats-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 30px 0;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-number {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 8px 20px;
            border-radius: var(--radius-full);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: var(--font-main);
        }
        .category-tab:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.12);
        }
        .category-tab.active {
            background: rgba(118,75,162,0.2);
            border-color: rgba(118,75,162,0.4);
            color: var(--text-primary);
        }
        .category-tab .tab-count {
            padding: 0 6px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.08);
            font-size: 11px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .title-line {
            width: 4px;
            height: 28px;
            background: var(--gradient-main);
            border-radius: var(--radius-full);
        }
        .apis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .api-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }
        .api-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .api-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .api-card .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .api-card .card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .api-card .card-icon.purple { background: rgba(118,75,162,0.15); }
        .api-card .card-icon.pink { background: rgba(240,147,251,0.15); }
        .api-card .card-icon.blue { background: rgba(102,126,234,0.15); }
        .api-card .card-icon.cyan { background: rgba(79,172,254,0.15); }
        .api-card .card-icon.green { background: rgba(0,230,118,0.15); }
        .api-card .card-icon.orange { background: rgba(255,171,64,0.15); }
        .api-card .card-icon.red { background: rgba(255,82,82,0.15); }
        .api-card .card-icon.yellow { background: rgba(255,214,0,0.15); }
        .api-card .card-status {
            padding: 3px 12px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .api-card .card-status.active {
            background: rgba(0,230,118,0.1);
            color: var(--success);
        }
        .api-card .card-status.beta {
            background: rgba(255,171,64,0.1);
            color: var(--warning);
        }
        .api-card .card-status.soon {
            background: rgba(255,82,82,0.1);
            color: var(--danger);
        }
        .api-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .api-card .api-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 14px;
            line-height: 1.6;
        }
        .api-card .api-endpoint {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--accent-4);
            direction: ltr;
            text-align: left;
            margin-bottom: 12px;
            overflow-x: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .api-card .api-endpoint .method {
            padding: 2px 10px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 10px;
            flex-shrink: 0;
        }
        .api-card .api-endpoint .method.get { background: rgba(0,230,118,0.15); color: var(--success); }
        .api-card .api-endpoint .method.post { background: rgba(102,126,234,0.15); color: var(--accent-1); }
        .api-card .api-endpoint .method.put { background: rgba(255,171,64,0.15); color: var(--warning); }
        .api-card .api-endpoint .method.delete { background: rgba(255,82,82,0.15); color: var(--danger); }
        .api-card .api-endpoint .endpoint-path {
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
            font-size: 12px;
        }
        .api-card .api-endpoint .copy-endpoint {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all 0.3s;
            font-size: 13px;
        }
        .api-card .api-endpoint .copy-endpoint:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        .api-card .api-example {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            direction: ltr;
            text-align: left;
            overflow-x: auto;
            position: relative;
        }
        .api-card .api-example .example-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }
        .api-card .api-example code {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .api-card .api-example .copy-example {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .api-card .api-example .copy-example:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .api-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
        }
        .api-card .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .api-card .card-badge {
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
        }
        .api-card .card-badge.free { background: rgba(102,126,234,0.1); color: var(--accent-1); border: 1px solid rgba(102,126,234,0.2); }
        .api-card .card-badge.premium { background: rgba(240,147,251,0.1); color: var(--accent-3); border: 1px solid rgba(240,147,251,0.2); }
        .api-card .card-badge.popular { background: rgba(255,214,0,0.1); color: #ffd600; border: 1px solid rgba(255,214,0,0.2); }
        .api-card .card-badge.new { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid rgba(0,230,118,0.2); }
        .api-card .try-btn {
            padding: 6px 16px;
            border-radius: var(--radius-full);
            background: var(--gradient-main);
            color: white;
            font-weight: 700;
            font-size: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-main);
        }
        .api-card .try-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(118,75,162,0.3);
        }
        .toast-container {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 11000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 350px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-md);
            background: rgba(15,15,42,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            animation: slideIn 0.3s ease-out;
        }
        .toast .toast-title { font-weight: 700; font-size: 14px; }
        .toast .toast-message { font-size: 13px; color: var(--text-secondary); }
        .toast.success { border-right: 3px solid var(--success); }
        .toast.error { border-right: 3px solid var(--danger); }
        .toast.info { border-right: 3px solid var(--accent-1); }
        .toast.warning { border-right: 3px solid var(--warning); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 30px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
        .footer a {
            color: var(--accent-1);
            text-decoration: none;
        }
        .footer a:hover { color: var(--accent-3); }
        @media (max-width: 768px) {
            .stats-section {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .apis-grid {
                grid-template-columns: 1fr;
            }
            .api-card .api-endpoint {
                flex-direction: column;
                align-items: flex-start;
            }
            .category-tabs {
                flex-wrap: nowrap;
            }
        }
        @media (max-width: 480px) {
            .main-container { padding: 0 14px; }
            .hero-title { font-size: 26px; }
            .stat-card .stat-number { font-size: 22px; }
            .stats-section { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="nav-brand">
            <div class="brand-icon">⚡</div>
            <span>Sonic API</span>
        </a>
        <div class="nav-status">
            <span class="dot"></span>
            <span>جميع الأنظمة تعمل</span>
        </div>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main -->
    <div class="main-container">
        <!-- Hero -->
        <section class="hero">
            <div class="hero-icon">🚀</div>
            <h1 class="hero-title">
                مركز <span class="gradient-text">APIs</span>
            </h1>
            <p class="hero-subtitle">
                مجموعة من أقوى الـ APIs المجانية والمميزة للمطورين. جاهزة للاستخدام في مشاريعك
            </p>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن API...">
            </div>
        </section>

        <!-- Stats -->
        <section class="stats-section">
            <div class="stat-card">
                <span class="stat-number" id="totalApis">0</span>
                <span class="stat-label">API متاحة</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="totalRequests">0</span>
                <span class="stat-label">طلب اليوم</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">99.9%</span>
                <span class="stat-label">وقت التشغيل</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">⚡</span>
                <span class="stat-label">جميع الخدمات نشطة</span>
            </div>
        </section>

        <!-- Categories -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">الكل <span class="tab-count" id="countAll">0</span></button>
            <button class="category-tab" data-category="downloader">📥 تحميل <span class="tab-count" id="countDownloader">0</span></button>
            <button class="category-tab" data-category="ai">🤖 ذكاء اصطناعي <span class="tab-count" id="countAi">0</span></button>
            <button class="category-tab" data-category="media">🎬 وسائط <span class="tab-count" id="countMedia">0</span></button>
            <button class="category-tab" data-category="tools">🔧 أدوات <span class="tab-count" id="countTools">0</span></button>
            <button class="category-tab" data-category="social">🌐 تواصل اجتماعي <span class="tab-count" id="countSocial">0</span></button>
        </div>

        <!-- APIs Grid -->
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-line"></span>
                جميع الـ APIs
            </h2>
        </div>
        <div class="apis-grid" id="apisGrid"></div>

        <!-- Footer -->
        <div class="footer">
            <p>⚡ SONIC DEV ❯ | 🇲🇦 — جميع الحقوق محفوظة © 2026</p>
            <p style="font-size: 11px; margin-top: 6px;">API Services for Developers</p>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // 📦 قاعدة بيانات الـ APIs
        // ═══════════════════════════════════════════════════════════════
        const apisDB = [
            {
                id: 'instagram',
                name: 'Instagram Downloader',
                icon: '📸',
                description: 'تحميل فيديوهات، صور، ريلز، وقصص من انستقرام بأعلى جودة. يدعم الألبومات والكاروسيل.',
                category: 'downloader',
                endpoint: '/api/instagram',
                method: 'GET',
                status: 'active',
                color: 'pink',
                badges: ['popular', 'free'],
                example: `// مثال: تحميل ريل من انستقرام
fetch('/api/instagram?url=https://www.instagram.com/reel/C7Xxyz123/')
  .then(res => res.json())
  .then(data => {
    console.log('أفضل جودة:', data.data.bestQuality.url);
    console.log('جميع الفيديوهات:', data.data.videos);
    console.log('الصور:', data.data.images);
  });`,
                responseExample: `{
  "success": true,
  "data": {
    "type": "single",
    "count": 1,
    "videos": [
      { "url": "https://...mp4", "quality": "HD" }
    ],
    "images": [],
    "bestQuality": {
      "url": "https://...mp4",
      "quality": "HD"
    }
  }
}`
            },
            {
                id: 'youtube',
                name: 'YouTube Downloader',
                icon: '▶️',
                description: 'تحميل فيديوهات يوتيوب بجودات متعددة حتى 4K. دعم الفيديوهات الطويلة والشورتس.',
                category: 'downloader',
                endpoint: '/api/youtube',
                method: 'GET',
                status: 'beta',
                color: 'red',
                badges: ['new', 'free'],
                example: `// مثال: تحميل فيديو يوتيوب بجودة 1080p
fetch('/api/youtube?url=https://www.youtube.com/watch?v=xxx&quality=1080p')
  .then(res => res.json())
  .then(data => console.log('رابط التحميل:', data.data.url));`,
                responseExample: `{
  "success": true,
  "data": {
    "title": "عنوان الفيديو",
    "url": "https://...mp4",
    "quality": "1080p",
    "thumbnail": "https://...jpg"
  }
}`
            },
            {
                id: 'tiktok',
                name: 'TikTok Downloader',
                icon: '🎵',
                description: 'تحميل فيديوهات تيك توك بدون علامة مائية وبجودة عالية. يدعم الأصوات والوصف.',
                category: 'downloader',
                endpoint: '/api/tiktok',
                method: 'GET',
                status: 'beta',
                color: 'cyan',
                badges: ['new', 'free'],
                example: `// مثال: تحميل فيديو تيك توك
fetch('/api/tiktok?url=https://www.tiktok.com/@user/video/xxx')
  .then(res => res.json())
  .then(data => {
    console.log('فيديو بدون علامة مائية:', data.data.url);
    console.log('الصوت:', data.data.audio);
  });`,
                responseExample: `{
  "success": true,
  "data": {
    "url": "https://...mp4",
    "audio": "https://...mp3",
    "description": "وصف الفيديو"
  }
}`
            },
            {
                id: 'ai-chat',
                name: 'AI Chat Assistant',
                icon: '🤖',
                description: 'مساعد ذكي مدعوم بـ GPT للإجابة على الأسئلة، كتابة المحتوى، والمساعدة في البرمجة.',
                category: 'ai',
                endpoint: '/api/ai/chat',
                method: 'POST',
                status: 'beta',
                color: 'purple',
                badges: ['new', 'premium'],
                example: `// مثال: محادثة مع الذكاء الاصطناعي
fetch('/api/ai/chat', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ 
    message: 'اكتب لي مقال عن الذكاء الاصطناعي'
  })
})
.then(res => res.json())
.then(data => console.log('الرد:', data.data.reply));`,
                responseExample: `{
  "success": true,
  "data": {
    "reply": "نص الرد من الذكاء الاصطناعي",
    "tokens": 150
  }
}`
            },
            {
                id: 'ai-image',
                name: 'AI Image Generator',
                icon: '🎨',
                description: 'توليد صور إبداعية من وصف نصي باستخدام أحدث نماذج الذكاء الاصطناعي.',
                category: 'ai',
                endpoint: '/api/ai/image',
                method: 'POST',
                status: 'soon',
                color: 'pink',
                badges: ['premium'],
                example: `// مثال: إنشاء صورة من وصف
fetch('/api/ai/image', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ 
    prompt: 'قطة ترتدي نظارة شمسية',
    style: 'realistic'
  })
})
.then(res => res.json())
.then(data => console.log('الصورة:', data.data.url));`,
                responseExample: `{
  "success": true,
  "data": {
    "url": "https://...png",
    "prompt": "قطة ترتدي نظارة شمسية"
  }
}`
            },
            {
                id: 'tts',
                name: 'Text to Speech',
                icon: '🗣️',
                description: 'تحويل النص إلى صوت طبيعي بجودة عالية. يدعم العربية والإنجليزية والعديد من اللغات.',
                category: 'media',
                endpoint: '/api/tts',
                method: 'GET',
                status: 'active',
                color: 'orange',
                badges: ['free'],
                example: `// مثال: تحويل نص إلى صوت
fetch('/api/tts?text=مرحبا بالعالم&lang=ar')
  .then(res => res.blob())
  .then(blob => {
    const audio = new Audio(URL.createObjectURL(blob));
    audio.play();
  });`,
                responseExample: `// يعيد ملف صوتي (MP3/WAV)
// Content-Type: audio/mpeg
// (ملف صوتي قابل للتشغيل)`
            },
            {
                id: 'qrcode',
                name: 'QR Code Generator',
                icon: '📱',
                description: 'إنشاء رموز QR مخصصة للروابط والنصوص مع إمكانية تحديد الحجم والألوان.',
                category: 'tools',
                endpoint: '/api/qrcode',
                method: 'GET',
                status: 'active',
                color: 'blue',
                badges: ['free'],
                example: `// مثال: إنشاء QR Code لرابط
const qrImg = document.getElementById('qr');
qrImg.src = '/api/qrcode?text=https://example.com&size=300&color=%23667eea';

// أو تحميله مباشرة
window.open('/api/qrcode?text=مرحباً&size=400');`,
                responseExample: `// يعيد صورة QR Code (PNG)
// Content-Type: image/png
// (صورة QR Code قابلة للعرض)`
            },
            {
                id: 'shorten',
                name: 'URL Shortener',
                icon: '🔗',
                description: 'اختصار الروابط الطويلة مع إمكانية تتبع عدد النقرات وإحصائيات الزوار.',
                category: 'tools',
                endpoint: '/api/shorten',
                method: 'POST',
                status: 'active',
                color: 'green',
                badges: ['free'],
                example: `// مثال: اختصار رابط
fetch('/api/shorten', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ 
    url: 'https://example.com/very/long/url'
  })
})
.then(res => res.json())
.then(data => console.log('الرابط المختصر:', data.data.shortUrl));`,
                responseExample: `{
  "success": true,
  "data": {
    "shortUrl": "https://api.com/abc123",
    "originalUrl": "https://example.com/very/long/url"
  }
}`
            }
        ];

        // ═══════════════════════════════════════════════════════════════
        // 🔧 المتغيرات
        // ═══════════════════════════════════════════════════════════════
        let currentCategory = 'all';
        let currentSearch = '';
        let totalRequests = 0;

        // ═══════════════════════════════════════════════════════════════
        // 🍞 Toast System
        // ═══════════════════════════════════════════════════════════════
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ═══════════════════════════════════════════════════════════════
        // 📋 نسخ النص
        // ═══════════════════════════════════════════════════════════════
        function copyText(text, successMsg = 'تم النسخ') {
            navigator.clipboard.writeText(text).then(() => {
                showToast('success', '✅ تم النسخ', successMsg);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('success', '✅ تم النسخ', successMsg);
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // 🔍 البحث
        // ═══════════════════════════════════════════════════════════════
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.trim();
            renderApis();
        });

        // ═══════════════════════════════════════════════════════════════
        // 🏷️ التصنيفات
        // ═══════════════════════════════════════════════════════════════
        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.category-tab');
            if (!tab) return;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.dataset.category;
            renderApis();
        });

        // ═══════════════════════════════════════════════════════════════
        // 🃏 عرض الـ APIs
        // ═══════════════════════════════════════════════════════════════
        function renderApis() {
            const grid = document.getElementById('apisGrid');
            grid.innerHTML = '';

            let filtered = apisDB.filter(api => {
                const catMatch = currentCategory === 'all' || api.category === currentCategory;
                const searchMatch = !currentSearch ||
                    api.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    api.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    api.category.toLowerCase().includes(currentSearch.toLowerCase());
                return catMatch && searchMatch;
            });

            updateCategoryCounts();

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);">
                        <div style="font-size:48px;margin-bottom:16px;opacity:0.3;">🔍</div>
                        <p style="font-size:16px;">لم يتم العثور على APIs مطابقة</p>
                        <p style="font-size:13px;margin-top:6px;">جرب كلمات بحث مختلفة أو غير التصنيف</p>
                    </div>
                `;
                return;
            }

            filtered.forEach((api, index) => {
                const card = document.createElement('div');
                card.className = 'api-card';
                card.dataset.id = api.id;

                const statusLabels = {
                    active: '🟢 نشط',
                    beta: '🟡 تجريبي',
                    soon: '🔴 قريباً'
                };

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon ${api.color}">${api.icon}</div>
                        <span class="card-status ${api.status}">${statusLabels[api.status] || api.status}</span>
                    </div>
                    <h3>${api.name}</h3>
                    <p class="api-desc">${api.description}</p>
                    <div class="api-endpoint">
                        <span class="method ${api.method.toLowerCase()}">${api.method}</span>
                        <span class="endpoint-path">${api.endpoint}</span>
                        <button class="copy-endpoint" data-tooltip="نسخ الرابط">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                    <div class="api-example">
                        <span class="example-label">📌 مثال الاستخدام</span>
                        <code>${api.example}</code>
                        <button class="copy-example">📋 نسخ</button>
                    </div>
                    ${api.responseExample ? `
                    <div class="api-example" style="margin-top:8px;">
                        <span class="example-label">📤 نموذج الرد</span>
                        <code>${api.responseExample}</code>
                    </div>
                    ` : ''}
                    <div class="card-footer">
                        <div class="card-badges">
                            ${api.badges.map(b => `<span class="card-badge ${b}">${getBadgeLabel(b)}</span>`).join('')}
                        </div>
                        <button class="try-btn" data-id="${api.id}">
                            <i class="fa-solid fa-play"></i> تجربة
                        </button>
                    </div>
                `;

                setTimeout(() => card.classList.add('visible'), index * 80);

                // نسخ الرابط
                card.querySelector('.copy-endpoint').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const baseUrl = window.location.origin;
                    copyText(baseUrl + api.endpoint, 'تم نسخ رابط API');
                });

                // نسخ المثال
                card.querySelector('.copy-example').addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyText(api.example, 'تم نسخ مثال الاستخدام');
                });

                // زر التجربة
                card.querySelector('.try-btn').addEventListener('click', () => {
                    if (api.status === 'soon') {
                        showToast('warning', 'قريباً', `${api.name} قيد التطوير`);
                        return;
                    }
                    // فتح الرابط في تبويب جديد للتجربة
                    const baseUrl = window.location.origin;
                    window.open(baseUrl + api.endpoint + '?url=example', '_blank');
                    totalRequests++;
                    document.getElementById('totalRequests').textContent = totalRequests;
                });

                grid.appendChild(card);
            });

            document.getElementById('totalApis').textContent = filtered.length;
        }

        function getBadgeLabel(badge) {
            const labels = {
                'popular': '⭐ شائع',
                'new': '🆕 جديد',
                'free': '🆓 مجاني',
                'premium': '💎 مميز'
            };
            return labels[badge] || badge;
        }

        function updateCategoryCounts() {
            const counts = { all: 0, downloader: 0, ai: 0, media: 0, tools: 0, social: 0 };
            apisDB.forEach(api => {
                counts.all++;
                if (counts.hasOwnProperty(api.category)) counts[api.category]++;
            });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countDownloader').textContent = counts.downloader;
            document.getElementById('countAi').textContent = counts.ai;
            document.getElementById('countMedia').textContent = counts.media;
            document.getElementById('countTools').textContent = counts.tools;
            document.getElementById('countSocial').textContent = counts.social;
        }

        // ═══════════════════════════════════════════════════════════════
        // 🚀 بدء التشغيل
        // ═══════════════════════════════════════════════════════════════
        renderApis();
        console.log('🚀 Sonic API Center ready!');
        console.log(`📚 ${apisDB.length} API متاحة`);
    </script>
</body>
</html>
