<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الخدمات - Sonic API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0a0a1a;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.07);
            --border-color: rgba(255,255,255,0.06);
            --border-hover: rgba(118,75,162,0.5);
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-muted: #5a5a7a;
            --accent-1: #667eea;
            --accent-2: #764ba2;
            --accent-3: #f093fb;
            --success: #00e676;
            --warning: #ffab40;
            --danger: #ff5252;
            --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --font-main: 'Tajawal', sans-serif;
            --header-height: 70px;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--header-height);
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(10,10,26,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
        }
        .nav-brand .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .main-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .hero {
            padding: 40px 0 30px;
            text-align: center;
        }
        .hero-title {
            font-size: clamp(32px, 6vw, 50px);
            font-weight: 900;
        }
        .hero-title .gradient-text {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 10px auto 30px;
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            font-size: 15px;
        }
        .search-input:focus {
            border-color: var(--accent-1);
            outline: none;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .stats-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 30px 0;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-number {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            overflow-x: auto;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 8px 20px;
            border-radius: var(--radius-full);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .category-tab:hover {
            color: var(--text-primary);
            border-color: rgba(255,255,255,0.12);
        }
        .category-tab.active {
            background: rgba(118,75,162,0.2);
            border-color: rgba(118,75,162,0.4);
            color: var(--text-primary);
        }
        .category-tab .tab-count {
            padding: 0 6px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.08);
            font-size: 11px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 22px;
            font-weight: 800;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .service-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }
        .service-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .service-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }
        .service-card.disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .service-card.disabled:hover {
            transform: none;
        }
        .card-status {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
        }
        .card-status.active {
            background: rgba(0,230,118,0.1);
            color: var(--success);
        }
        .card-status.soon {
            background: rgba(255,171,64,0.1);
            color: var(--warning);
        }
        .card-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 12px;
        }
        .card-icon-wrap.pink { background: rgba(240,147,251,0.15); }
        .card-icon-wrap.purple { background: rgba(118,75,162,0.15); }
        .card-icon-wrap.red { background: rgba(255,82,82,0.15); }
        .card-icon-wrap.cyan { background: rgba(79,172,254,0.15); }
        .card-icon-wrap.blue { background: rgba(102,126,234,0.15); }
        .card-icon-wrap.green { background: rgba(0,230,118,0.15); }
        .card-icon-wrap.orange { background: rgba(255,171,64,0.15); }
        .card-icon-wrap.yellow { background: rgba(255,214,0,0.15); }
        .card-body h3 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-body p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }
        .card-badges {
            display: flex;
            gap: 6px;
        }
        .card-badge {
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
        }
        .card-badge.popular { background: rgba(255,214,0,0.12); color: #ffd600; border: 1px solid rgba(255,214,0,0.2); }
        .card-badge.new-badge { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid rgba(0,230,118,0.2); }
        .card-badge.soon-badge { background: rgba(255,171,64,0.1); color: var(--warning); border: 1px solid rgba(255,171,64,0.2); }
        .card-badge.free { background: rgba(102,126,234,0.1); color: var(--accent-1); border: 1px solid rgba(102,126,234,0.2); }
        .card-badge.premium { background: rgba(240,147,251,0.1); color: var(--accent-3); border: 1px solid rgba(240,147,251,0.2); }
        .card-arrow {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }
        .service-card:hover .card-arrow {
            background: rgba(118,75,162,0.2);
            color: var(--accent-3);
        }
        .toast-container {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 11000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-md);
            background: rgba(15,15,42,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            min-width: 250px;
            animation: slideIn 0.3s ease-out;
        }
        .toast .toast-title { font-weight: 700; font-size: 14px; }
        .toast .toast-message { font-size: 13px; color: var(--text-secondary); }
        .toast.success { border-right: 3px solid var(--success); }
        .toast.error { border-right: 3px solid var(--danger); }
        .toast.info { border-right: 3px solid var(--accent-1); }
        .toast.warning { border-right: 3px solid var(--warning); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-box {
            background: #0f0f2a;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
        }
        .modal-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-header-bar .modal-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-header-bar .modal-icon-lg {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .modal-header-bar h2 { font-size: 18px; }
        .modal-header-bar .modal-subtitle { font-size: 12px; color: var(--text-muted); }
        .modal-close-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 18px;
            border: none;
            cursor: pointer;
        }
        .modal-close-btn:hover { color: var(--text-primary); }
        .modal-body-content {
            padding: 20px;
            overflow-y: auto;
        }
        .modal-input-group {
            display: flex;
            gap: 10px;
        }
        .modal-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.04);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
        }
        .modal-input:focus {
            border-color: var(--accent-1);
            outline: none;
        }
        .modal-submit-btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            background: var(--gradient-main);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(118,75,162,0.3);
        }
        .modal-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-container {
            display: none;
            margin-top: 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }
        .result-container.active { display: block; }
        .result-header {
            padding: 10px 16px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }
        .result-body {
            max-height: 250px;
            overflow-y: auto;
        }
        .result-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .result-entry .entry-info { flex: 1; }
        .result-entry .entry-title { font-weight: 600; font-size: 13px; }
        .result-entry .entry-meta { font-size: 11px; color: var(--text-muted); }
        .result-entry .entry-actions { display: flex; gap: 6px; }
        .entry-action-btn {
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }
        .entry-action-btn:hover {
            background: rgba(118,75,162,0.2);
            color: var(--text-primary);
        }
        .entry-action-btn.download-btn:hover {
            background: rgba(0,230,118,0.15);
            color: var(--success);
        }
        .result-error { padding: 20px; text-align: center; }
        .result-error .error-text { color: var(--danger); font-weight: 500; }
        .result-loading {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
        }
        .back-to-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-full);
            background: var(--gradient-main);
            color: white;
            font-size: 18px;
            border: none;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 30px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
        @media (max-width: 768px) {
            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }
            .services-grid {
                grid-template-columns: 1fr;
            }
            .modal-input-group {
                flex-direction: column;
            }
            .category-tabs {
                flex-wrap: nowrap;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="nav-brand">
            <div class="brand-icon">⚡</div>
            <span>Sonic API</span>
        </a>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main -->
    <div class="main-container">
        <!-- Hero -->
        <section class="hero">
            <h1 class="hero-title">
                مركز الخدمات
                <span class="gradient-text">Sonic API</span>
            </h1>
            <p class="hero-subtitle">
                منصة متكاملة تضم أقوى الأدوات والخدمات البرمجية في مكان واحد
            </p>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث عن أي خدمة...">
            </div>
        </section>

        <!-- Stats -->
        <section class="stats-section">
            <div class="stat-card">
                <span class="stat-number" id="totalServices">0</span>
                <span class="stat-label">خدمة متاحة</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="requestCount">0</span>
                <span class="stat-label">طلب اليوم</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">99.9%</span>
                <span class="stat-label">وقت التشغيل</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">0.3s</span>
                <span class="stat-label">متوسط الاستجابة</span>
            </div>
        </section>

        <!-- Categories -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">الكل <span class="tab-count" id="countAll">0</span></button>
            <button class="category-tab" data-category="downloader">📥 التحميل <span class="tab-count" id="countDownloader">0</span></button>
            <button class="category-tab" data-category="ai">🤖 ذكاء اصطناعي <span class="tab-count" id="countAi">0</span></button>
            <button class="category-tab" data-category="media">🎬 الوسائط <span class="tab-count" id="countMedia">0</span></button>
            <button class="category-tab" data-category="tools">🔧 أدوات <span class="tab-count" id="countTools">0</span></button>
            <button class="category-tab" data-category="social">🌐 تواصل اجتماعي <span class="tab-count" id="countSocial">0</span></button>
            <button class="category-tab" data-category="developer">💻 مطورين <span class="tab-count" id="countDeveloper">0</span></button>
        </div>

        <!-- Services Grid -->
        <div class="section-header">
            <h2 class="section-title">جميع الخدمات</h2>
        </div>
        <div class="services-grid" id="servicesGrid"></div>

        <!-- Footer -->
        <div class="footer">
            <p>⚡ SONIC DEV ❯ | 🇲🇦 المغرب — جميع الحقوق محفوظة © 2026</p>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop">↑</button>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header-bar">
                <div class="modal-title-group">
                    <div class="modal-icon-lg" id="modalIconLg"></div>
                    <div>
                        <h2 id="modalTitle">عنوان الخدمة</h2>
                        <p class="modal-subtitle" id="modalSubtitle">وصف مختصر</p>
                    </div>
                </div>
                <button class="modal-close-btn" id="modalCloseBtn">✕</button>
            </div>
            <div class="modal-body-content">
                <div class="modal-input-group">
                    <input type="text" class="modal-input" id="modalInput" placeholder="أدخل الرابط أو النص...">
                    <button class="modal-submit-btn" id="modalSubmitBtn">
                        <span class="btn-text">تنفيذ</span>
                    </button>
                </div>
                <div class="result-container" id="resultContainer">
                    <div class="result-header">
                        <span class="result-label">النتائج</span>
                        <span class="result-time" id="resultTime"></span>
                    </div>
                    <div class="result-body" id="resultBody"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // 📦 قاعدة بيانات الخدمات
        // ═══════════════════════════════════════════════════════════════

        // ═══════════════════════════════════════════════════════════════
        // 🔧 المتغيرات العامة
        // ═══════════════════════════════════════════════════════════════
        let currentCategory = 'all';
        let currentSearch = '';
        let totalRequests = 0;
        let currentService = null;

        // ═══════════════════════════════════════════════════════════════
        // 🍞 نظام الإشعارات
        // ═══════════════════════════════════════════════════════════════
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ═══════════════════════════════════════════════════════════════
        // 🔍 البحث
        // ═══════════════════════════════════════════════════════════════
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.trim();
            renderServices();
        });

        // ═══════════════════════════════════════════════════════════════
        // 🏷️ التصنيفات
        // ═══════════════════════════════════════════════════════════════
        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.category-tab');
            if (!tab) return;
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.dataset.category;
            renderServices();
        });

        // ═══════════════════════════════════════════════════════════════
        // 🃏 عرض الخدمات
        // ═══════════════════════════════════════════════════════════════
        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';

            let filtered = servicesDB.filter(service => {
                const catMatch = currentCategory === 'all' || service.category === currentCategory;
                const searchMatch = !currentSearch ||
                    service.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    service.description.toLowerCase().includes(currentSearch.toLowerCase());
                return catMatch && searchMatch;
            });

            updateCategoryCounts();

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);">
                        <div style="font-size:48px;margin-bottom:16px;opacity:0.3;">🔍</div>
                        <p style="font-size:16px;">لم يتم العثور على خدمات مطابقة</p>
                    </div>
                `;
                return;
            }

            filtered.forEach((service, index) => {
                const card = document.createElement('div');
                card.className = `service-card ${service.status === 'soon' ? 'disabled' : ''}`;
                card.dataset.id = service.id;

                const statusLabels = { active: 'نشط', soon: 'قريباً', maintenance: 'صيانة' };

                card.innerHTML = `
                    <div class="card-status ${service.status}">${statusLabels[service.status]}</div>
                    <div class="card-icon-wrap ${service.color}">${service.icon}</div>
                    <div class="card-body">
                        <h3>${service.name}</h3>
                        <p>${service.description}</p>
                    </div>
                    <div class="card-footer">
                        <div class="card-badges">
                            ${service.badges.map(b => `<span class="card-badge ${b}">${getBadgeLabel(b)}</span>`).join('')}
                        </div>
                        <div class="card-arrow"><i class="fa-solid fa-arrow-left"></i></div>
                    </div>
                `;

                setTimeout(() => card.classList.add('visible'), index * 50);

                card.addEventListener('click', () => {
                    if (service.status === 'soon') {
                        showToast('warning', 'قريباً', `${service.name} ستتوفر قريباً`);
                        return;
                    }
                    openModal(service);
                });

                grid.appendChild(card);
            });

            document.getElementById('totalServices').textContent = filtered.length;
        }

        function getBadgeLabel(badge) {
            const labels = {
                'popular': 'الأكثر استخداماً',
                'new-badge': 'جديد',
                'soon-badge': 'قريباً',
                'free': 'مجاني',
                'premium': 'مميز'
            };
            return labels[badge] || badge;
        }

        function updateCategoryCounts() {
            const counts = { all: 0, downloader: 0, ai: 0, media: 0, tools: 0, social: 0, developer: 0 };
            servicesDB.forEach(s => {
                counts.all++;
                if (counts.hasOwnProperty(s.category)) counts[s.category]++;
            });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countDownloader').textContent = counts.downloader;
            document.getElementById('countAi').textContent = counts.ai;
            document.getElementById('countMedia').textContent = counts.media;
            document.getElementById('countTools').textContent = counts.tools;
            document.getElementById('countSocial').textContent = counts.social;
            document.getElementById('countDeveloper').textContent = counts.developer;
        }

        // ═══════════════════════════════════════════════════════════════
        // 🪟 النافذة المنبثقة
        // ═══════════════════════════════════════════════════════════════
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const modalSubmitBtn = document.getElementById('modalSubmitBtn');
        const modalInput = document.getElementById('modalInput');
        const resultContainer = document.getElementById('resultContainer');
        const resultBody = document.getElementById('resultBody');

        function openModal(service) {
            currentService = service;
            const iconEl = document.getElementById('modalIconLg');
            iconEl.className = `modal-icon-lg ${service.color}`;
            iconEl.textContent = service.icon;
            document.getElementById('modalTitle').textContent = service.name;
            document.getElementById('modalSubtitle').textContent = service.description;
            modalInput.placeholder = service.inputPlaceholder;
            modalInput.value = '';
            const btnText = modalSubmitBtn.querySelector('.btn-text');
            btnText.innerHTML = `<i class="fa-solid ${service.btnIcon}"></i> ${service.btnText}`;
            modalSubmitBtn.disabled = false;
            resultContainer.classList.remove('active');
            resultBody.innerHTML = '';
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            setTimeout(() => modalInput.focus(), 200);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            currentService = null;
        }

        modalCloseBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        modalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') modalSubmitBtn.click();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
        });

        // ═══════════════════════════════════════════════════════════════
        // 🚀 معالجة الطلبات
        // ═══════════════════════════════════════════════════════════════
        modalSubmitBtn.addEventListener('click', async () => {
            if (!currentService) return;
            const inputVal = modalInput.value.trim();
            if (!inputVal) {
                showToast('error', 'خطأ', 'يرجى إدخال الرابط أو النص المطلوب');
                return;
            }

            modalSubmitBtn.disabled = true;
            resultContainer.classList.add('active');
            resultBody.innerHTML = `<div class="result-loading">⏳ جاري المعالجة...</div>`;

            try {
                const apiUrl = `${currentService.endpoint}?url=${encodeURIComponent(inputVal)}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    let errMsg = 'حدث خطأ في الخادم';
                    try {
                        const errData = await response.json();
                        errMsg = errData.error || errMsg;
                    } catch(e) {}
                    throw new Error(errMsg);
                }

                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'فشل تنفيذ الطلب');

                document.getElementById('resultTime').textContent = `${((performance.now() - startTime) / 1000).toFixed(2)}s`;
                displayResults(data);
                totalRequests++;
                document.getElementById('requestCount').textContent = totalRequests;
                showToast('success', 'تم بنجاح', `تمت معالجة طلب ${currentService.name}`);

            } catch (error) {
                resultBody.innerHTML = `
                    <div class="result-error">
                        <div class="error-text">⚠️ ${error.message}</div>
                    </div>
                `;
                showToast('error', 'فشل', error.message);
            } finally {
                modalSubmitBtn.disabled = false;
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // 📊 عرض النتائج
        // ═══════════════════════════════════════════════════════════════
        function displayResults(data) {
            let html = '';
            if (data.data && data.data.bestQuality) {
                html += `
                    <div class="result-entry" style="background:rgba(118,75,162,0.06);">
                        <div class="entry-info">
                            <div class="entry-title">⭐ أفضل جودة</div>
                            <div class="entry-meta">${data.data.bestQuality.quality || 'HD'}</div>
                        </div>
                        <div class="entry-actions">
                            <a href="${data.data.bestQuality.url}" target="_blank" class="entry-action-btn download-btn"><i class="fa-solid fa-download"></i></a>
                            <button class="entry-action-btn copy-btn" data-url="${data.data.bestQuality.url}"><i class="fa-solid fa-copy"></i></button>
                        </div>
                    </div>
                `;
            }
            if (data.data && data.data.videos) {
                data.data.videos.forEach((video, i) => {
                    html += `
                        <div class="result-entry">
                            <div class="entry-info">
                                <div class="entry-title">🎬 فيديو ${i+1}</div>
                                <div class="entry-meta">${video.quality || 'جودة قياسية'}</div>
                            </div>
                            <div class="entry-actions">
                                <a href="${video.url}" target="_blank" class="entry-action-btn download-btn"><i class="fa-solid fa-download"></i></a>
                                <button class="entry-action-btn copy-btn" data-url="${video.url}"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
            if (data.data && data.data.images) {
                data.data.images.forEach((image, i) => {
                    html += `
                        <div class="result-entry">
                            <div class="entry-info">
                                <div class="entry-title">🖼️ صورة ${i+1}</div>
                                <div class="entry-meta">PNG / JPG</div>
                            </div>
                            <div class="entry-actions">
                                <a href="${image.url}" target="_blank" class="entry-action-btn download-btn"><i class="fa-solid fa-download"></i></a>
                                <button class="entry-action-btn copy-btn" data-url="${image.url}"><i class="fa-solid fa-copy"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
            if (!html) {
                html = `
                    <div class="result-entry">
                        <div class="entry-info">
                            <pre style="color:var(--text-secondary);font-size:12px;white-space:pre-wrap;word-break:break-all;">${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    </div>
                `;
            }
            resultBody.innerHTML = html;

            // أزرار النسخ
            resultBody.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const url = btn.dataset.url;
                    navigator.clipboard.writeText(url).then(() => {
                        showToast('success', 'تم النسخ', 'تم نسخ الرابط');
                    }).catch(() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = url;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        showToast('success', 'تم النسخ', 'تم نسخ الرابط');
                    });
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // ⬆️ زر العودة للأعلى
        // ═══════════════════════════════════════════════════════════════
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 400);
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ═══════════════════════════════════════════════════════════════
        // 🚀 تشغيل التطبيق
        // ═══════════════════════════════════════════════════════════════
        renderServices();
        console.log('✅ Sonic API Center ready!');
        console.log(`📚 ${servicesDB.length} خدمة متاحة`);
    </script>
