<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Downloader API - Sonic DEV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .subtitle a {
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            min-width: 200px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .example {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }

        .example a {
            color: #764ba2;
            cursor: pointer;
            text-decoration: underline;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #764ba2;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #result {
            display: none;
            margin-top: 30px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .result-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .video-item {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .video-item a {
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
        }

        .video-item a:hover {
            text-decoration: underline;
        }

        .quality-badge {
            background: #764ba2;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .best-quality {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .best-quality a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .best-quality a:hover {
            text-decoration: underline;
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            border-right: 4px solid #c00;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #764ba2;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .input-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📸</div>
            <h1>Instagram Downloader</h1>
            <div class="subtitle">
                API بواسطة <a href="#" target="_blank">𝑺𝑶𝑵𝑰𝑪 𝑫𝑬𝑽</a>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="أدخل رابط Instagram (Reel, Post, Story)">
            <button class="btn" id="downloadBtn">تحميل 📥</button>
        </div>

        <div class="example">
            مثال: <a id="exampleLink">https://www.instagram.com/reel/C7Xxyz123/</a>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            جاري تحميل الميديا...
        </div>

        <div id="result"></div>

        <div class="footer">
            <p>⚡ 𝚂𝙾𝙽𝙸𝙲➥Ᏼᝪᝨ ❯ | 🇲🇦</p>
            <p>جميع الحقوق محفوظة © 2026</p>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const exampleLink = document.getElementById('exampleLink');

        // مثال للاختبار
        const exampleUrl = 'https://www.instagram.com/reel/C7Xxyz123/';
        exampleLink.textContent = exampleUrl;
        exampleLink.onclick = () => {
            urlInput.value = exampleUrl;
            downloadMedia();
        };

        // حدث الضغط على Enter
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                downloadMedia();
            }
        });

        downloadBtn.addEventListener('click', downloadMedia);

        async function downloadMedia() {
            const url = urlInput.value.trim();
            if (!url) {
                showError('❌ يرجى إدخال رابط Instagram');
                return;
            }

            // التحقق من أن الرابط من Instagram
            if (!url.includes('instagram.com')) {
                showError('❌ الرابط يجب أن يكون من Instagram');
                return;
            }

            // إظهار التحميل
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            downloadBtn.disabled = true;
            resultDiv.innerHTML = '';

            try {
                // استدعاء الـ API
                const apiUrl = `/api/instagram?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'حدث خطأ في الخادم');
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'فشل تحميل الميديا');
                }

                // عرض النتائج
                displayResult(data);

            } catch (error) {
                showError(`❌ ${error.message}`);
            } finally {
                loading.style.display = 'none';
                downloadBtn.disabled = false;
            }
        }

        function displayResult(data) {
            resultDiv.style.display = 'block';
            let html = '';

            // معلومات عامة
            html += `
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">${data.data.count}</div>
                        <div class="stat-label">عدد الملفات</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.data.type === 'single' ? '🎬 فيديو' : '📦 ألبوم'}</div>
                        <div class="stat-label">النوع</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.data.videos.length}</div>
                        <div class="stat-label">فيديوهات</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.data.images.length}</div>
                        <div class="stat-label">صور</div>
                    </div>
                </div>
            `;

            // أفضل جودة
            if (data.data.bestQuality) {
                html += `
                    <div class="best-quality">
                        <div>🎯 أفضل جودة متاحة</div>
                        <a href="${data.data.bestQuality.url}" target="_blank">
                            ⬇️ تحميل ${data.data.bestQuality.quality || 'HD'}
                        </a>
                    </div>
                `;
            }

            // قائمة الفيديوهات
            if (data.data.videos.length > 0) {
                html += `
                    <div class="result-card">
                        <div class="result-title">🎬 الفيديوهات (${data.data.videos.length})</div>
                `;
                data.data.videos.forEach((video, index) => {
                    html += `
                        <div class="video-item">
                            <span>فيديو ${index + 1}</span>
                            <span class="quality-badge">${video.quality || 'جودة عادية'}</span>
                            <a href="${video.url}" target="_blank">⬇️ تحميل</a>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // قائمة الصور
            if (data.data.images.length > 0) {
                html += `
                    <div class="result-card">
                        <div class="result-title">🖼️ الصور (${data.data.images.length})</div>
                `;
                data.data.images.forEach((image, index) => {
                    html += `
                        <div class="video-item">
                            <span>صورة ${index + 1}</span>
                            <a href="${image.url}" target="_blank">⬇️ تحميل</a>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // معلومات إضافية
            html += `
                <div class="result-card" style="font-size: 12px; color: #888;">
                    <div>🆔 معرف الطلب: ${data.meta?.requestId || 'N/A'}</div>
                    <div>⏱️ الوقت: ${new Date(data.meta?.timestamp).toLocaleString('ar-EG')}</div>
                </div>
            `;

            resultDiv.innerHTML = html;
        }

        function showError(message) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div class="error">${message}</div>
            `;
        }

        // تحميل تلقائي عند دخول الصفحة (اختياري)
        // urlInput.value = exampleUrl;
    </script>
</body>
</html>
