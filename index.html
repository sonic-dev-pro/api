<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SONIC API — Cyberpunk Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ═══════════════════════════════════════════════════
           🌑 CSS VARIABLES — CYBERPUNK DARK THEME
           ═══════════════════════════════════════════════════ */
        :root {
            --bg-primary: #080810;
            --bg-secondary: #0b0b16;
            --bg-card: rgba(18, 18, 37, 0.75);
            --bg-card-hover: rgba(30, 30, 60, 0.85);
            --bg-input: rgba(10, 10, 25, 0.8);
            --bg-code: #06060c;
            --border-color: rgba(157, 78, 221, 0.15);
            --border-glow: rgba(157, 78, 221, 0.35);
            --text-primary: #f0eaff;
            --text-secondary: #a99bc4;
            --text-muted: #5f4e7a;
            --accent-purple: #8a2be2;
            --accent-glow: #9d4edd;
            --accent-dim: rgba(157, 78, 221, 0.12);
            --accent-bright: #b37ef7;
            --success: #00e676;
            --warning: #ffab40;
            --danger: #ff5252;
            --gradient-main: linear-gradient(135deg, #7c3aed 0%, #a855f7 60%, #d946ef 100%);
            --shadow-glow: 0 0 40px rgba(157, 78, 221, 0.12);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 9999px;
            --font-main: 'Tajawal', sans-serif;
            --font-mono: 'Courier New', monospace;
            --header-height: 68px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ═══════════════════════════════════════════════════
           🔄 RESET & BASE
           ═══════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background 0.4s, color 0.4s;
        }
        ::selection {
            background: rgba(157, 78, 221, 0.4);
            color: #fff;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-glow);
            border-radius: var(--radius-full);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-bright);
        }
        a {
            color: var(--accent-bright);
            text-decoration: none;
            transition: var(--transition);
        }
        a:hover {
            color: #fff;
        }
        button {
            font-family: var(--font-main);
            cursor: pointer;
            border: none;
            outline: none;
        }
        input,
        textarea {
            font-family: var(--font-main);
            outline: none;
            border: none;
        }

        /* ═══════════════════════════════════════════════════
           💜 SPLASH / LOADING SCREEN
           ═══════════════════════════════════════════════════ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-brand {
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 4px;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glowPulse 2s ease-in-out infinite alternate;
            position: relative;
        }
        .splash-brand::after {
            content: '✦';
            position: absolute;
            right: -1.2em;
            top: -0.2em;
            font-size: 0.5em;
            -webkit-text-fill-color: initial;
            color: var(--accent-glow);
            animation: spinGlow 3s linear infinite;
        }
        @keyframes glowPulse {
            0% {
                filter: drop-shadow(0 0 20px rgba(157, 78, 221, 0.2));
            }
            100% {
                filter: drop-shadow(0 0 60px rgba(157, 78, 221, 0.5));
            }
        }
        @keyframes spinGlow {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.2);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
        .splash-sub {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 8px;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .splash-bar-wrap {
            width: 220px;
            height: 3px;
            background: rgba(157, 78, 221, 0.15);
            border-radius: var(--radius-full);
            margin-top: 30px;
            overflow: hidden;
            position: relative;
        }
        .splash-bar {
            height: 100%;
            width: 0%;
            background: var(--gradient-main);
            border-radius: var(--radius-full);
            animation: loadBar 1.8s ease-in-out forwards;
        }
        @keyframes loadBar {
            0% {
                width: 0%;
            }
            60% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        /* ═══════════════════════════════════════════════════
           🧭 NAVBAR
           ═══════════════════════════════════════════════════ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: rgba(8, 8, 16, 0.82);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-bottom: 1px solid var(--border-color);
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            transition: var(--transition);
        }
        .navbar.scrolled {
            background: rgba(8, 8, 16, 0.96);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .nav-brand .brand-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulseDot 2s infinite;
        }
        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }
        .nav-brand .brand-icon {
            font-size: 1.4rem;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .nav-battery {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px 4px 10px;
            border-radius: var(--radius-full);
            background: rgba(157, 78, 221, 0.08);
            border: 1px solid rgba(157, 78, 221, 0.15);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        .nav-battery i {
            color: var(--accent-glow);
            font-size: 0.9rem;
        }
        .nav-battery .batt-num {
            color: var(--text-primary);
        }
        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            background: rgba(157, 78, 221, 0.15);
            color: var(--text-primary);
            border-color: var(--border-glow);
        }

        /* ═══════════════════════════════════════════════════
           🏠 HERO BANNER
           ═══════════════════════════════════════════════════ */
        .hero-section {
            padding-top: calc(var(--header-height) + 28px);
            padding-bottom: 20px;
        }
        .hero-banner {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: linear-gradient(145deg, #0d0d1f, #151530);
            border: 1px solid var(--border-color);
            padding: 32px 36px;
            min-height: 200px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: var(--shadow-card), var(--shadow-glow);
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 80% 20%, rgba(157, 78, 221, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(138, 43, 226, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        /* Anime character silhouette — pure CSS art */
        .hero-banner::after {
            content: '⚡';
            position: absolute;
            bottom: -10px;
            left: 10%;
            font-size: 12rem;
            opacity: 0.03;
            pointer-events: none;
            transform: rotate(-8deg);
        }
        .hero-left {
            position: relative;
            z-index: 1;
            flex: 1 1 280px;
        }
        .hero-left .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 16px 4px 12px;
            border-radius: var(--radius-full);
            background: rgba(157, 78, 221, 0.08);
            border: 1px solid rgba(157, 78, 221, 0.12);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-bright);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .hero-left .hero-badge i {
            font-size: 0.6rem;
        }
        .hero-left h1 {
            font-size: clamp(1.8rem, 4.5vw, 3.2rem);
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .hero-left h1 .highlight {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-left p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 6px;
            max-width: 420px;
        }
        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }
        .hero-actions .hbtn {
            padding: 6px 18px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .hero-actions .hbtn:hover {
            border-color: var(--accent-glow);
            color: var(--text-primary);
            background: rgba(157, 78, 221, 0.06);
        }
        .hero-actions .hbtn i {
            font-size: 0.8rem;
            color: var(--accent-glow);
        }
        .hero-right {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hero-right .credits-badge {
            padding: 6px 18px 6px 14px;
            border-radius: var(--radius-full);
            background: rgba(157, 78, 221, 0.06);
            border: 1px solid rgba(157, 78, 221, 0.1);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hero-right .credits-badge i {
            color: var(--accent-glow);
        }

        /* ═══════════════════════════════════════════════════
           🔍 SEARCH & CATEGORIES
           ═══════════════════════════════════════════════════ */
        .search-section {
            margin: 20px 0 18px;
        }
        .search-wrap {
            position: relative;
            max-width: 540px;
            margin: 0 auto;
        }
        .search-wrap i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
            pointer-events: none;
        }
        .search-wrap input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border-radius: var(--radius-full);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .search-wrap input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.08), 0 0 30px rgba(157, 78, 221, 0.04);
        }
        .search-wrap input::placeholder {
            color: var(--text-muted);
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 14px;
        }
        .category-pills .pill {
            padding: 5px 18px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-main);
        }
        .category-pills .pill:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
            background: rgba(157, 78, 221, 0.04);
        }
        .category-pills .pill.active {
            background: rgba(157, 78, 221, 0.10);
            border-color: var(--accent-glow);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.06);
        }
        .category-pills .pill .count {
            font-size: 0.6rem;
            opacity: 0.5;
            font-weight: 400;
        }

        /* ═══════════════════════════════════════════════════
           📦 ACCORDION — API ENDPOINTS
           ═══════════════════════════════════════════════════ */
        .accordion-section {
            margin: 18px 0 40px;
        }
        .accordion-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }
        .accordion-title i {
            color: var(--accent-glow);
        }
        .accordion-title span {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-right: auto;
        }

        .accordion {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .accordion-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(4px);
        }
        .accordion-item:hover {
            border-color: var(--border-glow);
        }
        .accordion-item.open {
            border-color: var(--accent-glow);
            box-shadow: 0 0 40px rgba(157, 78, 221, 0.06), var(--shadow-card);
        }

        .accordion-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
            background: transparent;
            width: 100%;
            text-align: right;
            font-family: var(--font-main);
            color: var(--text-primary);
        }
        .accordion-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .accordion-header .method-badge {
            padding: 2px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .method-badge.get {
            background: rgba(0, 230, 118, 0.12);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.15);
        }
        .method-badge.post {
            background: rgba(157, 78, 221, 0.12);
            color: var(--accent-bright);
            border: 1px solid rgba(157, 78, 221, 0.15);
        }
        .method-badge.put {
            background: rgba(255, 171, 64, 0.12);
            color: var(--warning);
            border: 1px solid rgba(255, 171, 64, 0.15);
        }
        .method-badge.delete {
            background: rgba(255, 82, 82, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 82, 82, 0.15);
        }
        .accordion-header .api-name {
            font-weight: 700;
            font-size: 0.95rem;
            flex: 1;
        }
        .accordion-header .api-status {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            background: rgba(0, 230, 118, 0.08);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.1);
            flex-shrink: 0;
        }
        .accordion-header .arrow {
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: var(--transition);
            flex-shrink: 0;
            margin-right: auto;
        }
        .accordion-item.open .accordion-header .arrow {
            transform: rotate(180deg);
            color: var(--accent-glow);
        }

        .accordion-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s;
            padding: 0 20px;
        }
        .accordion-item.open .accordion-body {
            max-height: 2000px;
            padding: 0 20px 24px;
        }

        .accordion-body .api-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            border-right: 2px solid var(--accent-glow);
        }

        /* Form inside accordion */
        .api-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .api-form .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .api-form .form-row label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 80px;
        }
        .api-form .form-row input,
        .api-form .form-row textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 0.85rem;
            transition: var(--transition);
            min-width: 160px;
            font-family: var(--font-main);
        }
        .api-form .form-row input:focus,
        .api-form .form-row textarea:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(157, 78, 221, 0.08);
        }
        .api-form .form-row input::placeholder,
        .api-form .form-row textarea::placeholder {
            color: var(--text-muted);
        }
        .api-form .form-row textarea {
            resize: vertical;
            min-height: 50px;
        }
        .file-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-main);
        }
        .file-upload-btn:hover {
            border-color: var(--accent-glow);
            color: var(--text-primary);
        }
        .file-upload-btn input[type="file"] {
            display: none;
        }
        .file-name-display {
            font-size: 0.7rem;
            color: var(--accent-bright);
            font-weight: 500;
        }

        /* Request URL box */
        .req-url-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: var(--bg-code);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            margin-top: 6px;
        }
        .req-url-box .url-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .req-url-box .url-text {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent-bright);
            overflow-x: auto;
            white-space: nowrap;
            direction: ltr;
            text-align: left;
            padding: 2px 0;
        }
        .req-url-box .copy-url-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 4px;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .req-url-box .copy-url-btn:hover {
            color: var(--text-primary);
        }

        /* Execute button */
        .execute-btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--gradient-main);
            color: #fff;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

        // ──────────────────────────────────────────────────────────────

        let currentCategory = 'all';

        let selectedFiles = {}; // تخزين الملفات لكل API

        // ──────────────────────────────────────────────────────────────
        //  🍞 TOAST SYSTEM
        // ──────────────────────────────────────────────────────────────
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3800);
        }

        // ──────────────────────────────────────────────────────────────
        //  📋 COPY HELPERS
        // ──────────────────────────────────────────────────────────────
        function copyText(text, successMsg = 'تم النسخ ✅') {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('success', '📋 نسخ', successMsg);
                }).catch(() => fallbackCopy(text, successMsg));
            } else {
                fallbackCopy(text, successMsg);
            }
        }

        function fallbackCopy(text, successMsg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('success', '📋 نسخ', successMsg);
            } catch (e) {
                showToast('error', '❌ خطأ', 'فشل النسخ');
            }
            document.body.removeChild(ta);
        }

        function copyResponse(apiId) {
            const el = document.getElementById(`resp-body-${apiId}`);
            if (!el) return;
            const text = el.textContent.trim();
            copyText(text, 'تم نسخ الـ Response');
        }

        function copyUrl(apiId) {
            const el = document.getElementById(`url-text-${apiId}`);
            if (!el) return;
            copyText(el.textContent, 'تم نسخ الرابط');
        }

        // ──────────────────────────────────────────────────────────────
        //  🎨 SYNTAX HIGHLIGHT (JSON)
        // ──────────────────────────────────────────────────────────────
        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function(match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'json-key' : 'json-string';
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return `<span class="${cls}">${match}</span>`;
                }
            );
        }

        // ──────────────────────────────────────────────────────────────
        //  🏷️ CATEGORY PILLS
        // ──────────────────────────────────────────────────────────────
        function renderCategoryPills() {
            const container = document.getElementById('categoryPills');
            const categories = {};
            Object.values(apisConfig).forEach(api => {
                if (api.status === 'active') {
                    categories[api.category] = (categories[api.category] || 0) + 1;
                }
            });
            let html =
                `<button class="pill ${currentCategory === 'all' ? 'active' : ''}" data-cat="all">📡 الكل <span class="count">(${Object.values(apisConfig).filter(a => a.status === 'active').length})</span></button>`;
            const catLabels = {
                downloader: '📥 تحميل',
                ai: '🤖 AI',
                media: '🖼️ وسائط',
                tools: '🔧 أدوات'
            };
            Object.keys(categories).forEach(cat => {
                const label = catLabels[cat] || cat;
                const active = currentCategory === cat ? 'active' : '';
                html +=
                    `<button class="pill ${active}" data-cat="${cat}">${label} <span class="count">(${categories[cat]})</span></button>`;
            });
            container.innerHTML = html;

            container.querySelectorAll('.pill').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.cat;
                    renderCategoryPills();
                    renderAccordion();
                });
            });
        }

        // ──────────────────────────────────────────────────────────────
        //  🧩 RENDER ACCORDION
        // ──────────────────────────────────────────────────────────────
        function renderAccordion() {
            const container = document.getElementById('accordionContainer');
            const search = document.getElementById('searchInput').value.trim().toLowerCase();

            let filtered = Object.values(apisConfig).filter(api => {
                if (api.status !== 'active') return false;
                const catMatch = currentCategory === 'all' || api.category === currentCategory;
                const searchMatch = !search ||
                    api.name.toLowerCase().includes(search) ||
                    api.description.toLowerCase().includes(search) ||
                    api.id.toLowerCase().includes(search);
                return catMatch && searchMatch;
            });

            document.getElementById('endpointCount').textContent = `${filtered.length} متاحة`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;color:var(--text-muted);">
                        <i class="fa-regular fa-search" style="font-size:2rem;opacity:0.3;"></i>
                        <p style="margin-top:10px;">لم يتم العثور على endpoints تطابق بحثك</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach((api, idx) => {
                const isOpen = activeApiId === api.id;
                const methodClass = api.method.toLowerCase();
                const statusLabel = api.status === 'active' ? '🟢 نشط' : '🔴 غير نشط';

                html += `
                    <div class="accordion-item ${isOpen ? 'open' : ''}" data-api="${api.id}">
                        <button class="accordion-header" onclick="toggleAccordion('${api.id}')" aria-expanded="${isOpen}">
                            <span class="method-badge ${methodClass}">${api.method}</span>
                            <span class="api-name"><i class="${api.icon}" style="margin-left:6px;color:var(--accent-glow);"></i>${api.name}</span>
                            <span class="api-status">${statusLabel}</span>
                            <span class="arrow"><i class="fa-regular fa-chevron-down"></i></span>
                        </button>
                        <div class="accordion-body">
                            <div class="api-desc">${api.description}</div>
                            <div class="api-form" id="form-${api.id}">
                                ${buildFormFields(api)}
                                <div class="req-url-box">
                                    <span class="url-label">🔗 REQUEST URL</span>
                                    <span class="url-text" id="url-text-${api.id}">${window.location.origin}${api.endpoint}?url=...</span>
                                    <button class="copy-url-btn" onclick="copyUrl('${api.id}')" aria-label="Copy URL"><i class="fa-regular fa-copy"></i></button>
                                </div>
                                <button class="execute-btn" id="exec-${api.id}" onclick="executeApi('${api.id}')">
                                    <span class="spinner"></span>
                                    <span class="btn-text"><i class="fa-regular fa-bolt"></i> ⚡ EXECUTE</span>
                                </button>
                                <div class="response-box" id="resp-${api.id}" style="display:none;">
                                    <div class="resp-header">
                                        <span class="resp-status" id="resp-status-${api.id}">
                                            <span class="dot green"></span> 200 OK
                                        </span>
                                        <button class="resp-copy" onclick="copyResponse('${api.id}')"><i class="fa-regular fa-copy"></i> نسخ</button>
                                    </div>
                                    <div class="resp-body" id="resp-body-${api.id}">// النتائج ستظهر هنا</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // بعد التصيير، نربط أحداث رفع الملفات
            document.querySelectorAll('.file-input-hidden').forEach(input => {
                const apiId = input.dataset.api;
                input.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        selectedFiles[apiId] = file;
                        const display = document.getElementById(`file-name-${apiId}`);
                        if (display) display.textContent = file.name;
                    }
                });
            });

            // تحديث URL للـ APIs التي تحتاجها
            Object.keys(apisConfig).forEach(id => {
                updateUrlDisplay(id);
            });
        }

        // ──────────────────────────────────────────────────────────────
        //  🧩 BUILD FORM FIELDS
        // ──────────────────────────────────────────────────────────────
        function buildFormFields(api) {
            let html = '';
            if (api.inputType === 'url' || api.inputType === 'text') {
                html += `
                    <div class="form-row">
                        <label>${api.label}</label>
                        <input type="text" id="input-${api.id}" placeholder="${api.placeholder}" value="${api.example || ''}" />
                    </div>
                `;
            } else if (api.inputType === 'file+text') {
                html += `
                    <div class="form-row">
                        <label>${api.label}</label>
                        <div style="display:flex;flex-wrap:wrap;gap:10px;flex:1;">
                            <input type="text" id="input-${api.id}" placeholder="${api.placeholder}" value="${api.example || ''}" style="flex:1;min-width:140px;" />
                            <div style="display:flex;align-items:center;gap:8px;">
                                <label class="file-upload-btn">
                                    <i class="fa-regular fa-cloud-arrow-up"></i> اختر صورة
                                    <input type="file" class="file-input-hidden" data-api="${api.id}" accept="image/*" />
                                </label>
                                <span class="file-name-display" id="file-name-${api.id}">(لم يتم الاختيار)</span>
                            </div>
                        </div>
                    </div>
                `;
            } else if (api.inputType === 'none') {
                // لا شيء
            }
            return html;
        }

        // ──────────────────────────────────────────────────────────────
        //  🔄 UPDATE URL DISPLAY
        // ──────────────────────────────────────────────────────────────
        function updateUrlDisplay(apiId) {
            const api = apisConfig[apiId];
            if (!api) return;
            const el = document.getElementById(`url-text-${apiId}`);
            if (!el) return;
            const base = window.location.origin + api.endpoint;
            let url = base;

            if (api.inputType === 'url' || api.inputType === 'text') {
                const input = document.getElementById(`input-${apiId}`);
                const val = input ? input.value.trim() : '';
                if (val) {
                    url += `?url=${encodeURIComponent(val)}`;
                } else {
                    url += `?url=...`;
                }
            } else if (api.inputType === 'file+text') {
                const input = document.getElementById(`input-${apiId}`);
                const val = input ? input.value.trim() : '';
                if (val) {
                    url += `?prompt=${encodeURIComponent(val)}`;
                } else {
                    url += `?prompt=...`;
                }
            }
            el.textContent = url;
        }

        // ──────────────────────────────────────────────────────────────
        //  🔽 TOGGLE ACCORDION
        // ──────────────────────────────────────────────────────────────
        function toggleAccordion(apiId) {
            if (activeApiId === apiId) {
                activeApiId = null;
            } else {
                activeApiId = apiId;
            }
            renderAccordion();
            // إعادة تعيين الملفات المختارة
            Object.keys(selectedFiles).forEach(key => {
                const display = document.getElementById(`file-name-${key}`);
                if (display && selectedFiles[key]) {
                    display.textContent = selectedFiles[key].name;
                }
            });
            // إعادة ربط الأحداث
            document.querySelectorAll('.file-input-hidden').forEach(inp => {
                const id = inp.dataset.api;
                inp.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        selectedFiles[id] = file;
                        const d = document.getElementById(`file-name-${id}`);
                        if (d) d.textContent = file.name;
                    }
                });
            });
        }

        // ──────────────────────────────────────────────────────────────
        //  🚀 EXECUTE API
        // ──────────────────────────────────────────────────────────────
        async function executeApi(apiId) {
            const api = apisConfig[apiId];
            if (!api) return;

            const btn = document.getElementById(`exec-${apiId}`);
            const respBox = document.getElementById(`resp-${apiId}`);
            const respBody = document.getElementById(`resp-body-${apiId}`);
            const respStatus = document.getElementById(`resp-status-${apiId}`);

            // جمع البيانات
            let inputValue = '';
            const inputEl = document.getElementById(`input-${apiId}`);
            if (inputEl) inputValue = inputEl.value.trim();

            let file = null;
            if (api.inputType === 'file+text') {
                file = selectedFiles[apiId] || null;
                if (!inputValue) {
                    showToast('error', '❌ خطأ', 'يرجى إدخال وصف التعديل');
                    return;
                }
                if (!file) {
                    showToast('error', '❌ خطأ', 'يرجى اختيار صورة');
                    return;
                }
            }

            if ((api.inputType === 'url' || api.inputType === 'text') && !inputValue) {
                showToast('error', '❌ خطأ', `يرجى إدخال ${api.label}`);
                return;
            }

            // إظهار حالة التحميل
            btn.classList.add('loading');
            btn.disabled = true;
            respBox.style.display = 'none';

            try {
                let url = `${window.location.origin}${api.endpoint}`;
                let options = {
                    method: api.method,
                    headers: {}
                };

                // بناء الطلب حسب النوع
                if (api.inputType === 'file+text') {
                    const formData = new FormData();
                    formData.append('prompt', inputValue);
                    formData.append('file', file);
                    options.body = formData;
                    // لا نضع Content-Type لأن FormData يحددها
                } else if (api.inputType === 'url' || api.inputType === 'text') {
                    if (api.id === 'write') {
                        url += `?text=${encodeURIComponent(inputValue)}`;
                    } else {
                        url += `?url=${encodeURIComponent(inputValue)}`;
                    }
                }
                // wallpaper لا يحتاج أي شيء

                const startTime = performance.now();
                let response;

                // معالجة خاصة لـ wallpaper و write لأنهما يعيدان صورة
                if (api.id === 'wallpaper' || api.id === 'write') {
                    response = await fetch(url);
                    if (!response.ok) {
                        let errMsg = 'حدث خطأ';
                        try {
                            const errData = await response.json();
                            errMsg = errData.error || errData.message || errMsg;
                        } catch (e) {}
                        throw new Error(errMsg);
                    }
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    const endTime = performance.now();
                    const time = ((endTime - startTime) / 1000).toFixed(2);

                    // عرض الصورة في response
                    respBody.innerHTML = `
                        <div style="text-align:center;padding:10px;">
                            <img src="${imageUrl}" alt="Result" style="max-width:100%;max-height:350px;border-radius:8px;border:1px solid var(--border-color);" />
                            <br>
                            <a href="${imageUrl}" download="${api.id}_${Date.now()}.png" style="display:inline-block;margin-top:12px;padding:8px 24px;background:var(--gradient-main);color:#fff;border-radius:var(--radius-full);font-weight:700;text-decoration:none;">⬇️ تحميل الصورة</a>
                        </div>
                    `;
                    respStatus.innerHTML = `<span class="dot green"></span> 200 OK — ${time}s`;
                    respBox.style.display = 'block';
                    showToast('success', '✅ تم بنجاح', 'تم تحميل الصورة');
                    return;
                }

                // باقي الـ APIs (JSON)
                response = await fetch(url, options);
                const endTime = performance.now();
                const time = ((endTime - startTime) / 1000).toFixed(2);

                if (!response.ok) {
                    let errMsg = 'حدث خطأ';
                    try {
                        const errData = await response.json();
                        errMsg = errData.error || errData.message || errMsg;
                    } catch (e) {}
                    throw new Error(errMsg);
                }

                const data = await response.json();
                const jsonStr = JSON.stringify(data, null, 2);
                respBody.innerHTML = syntaxHighlight(jsonStr);
                respStatus.innerHTML = `<span class="dot green"></span> 200 OK — ${time}s`;
                respBox.style.display = 'block';
                showToast('success', '✅ تم بنجاح', 'تم تنفيذ الطلب');

            } catch (error) {
                respBody.innerHTML =
                    `<span class="error-text">❌ ${error.message || 'حدث خطأ غير متوقع'}</span>`;
                respStatus.innerHTML = `<span class="dot red"></span> 500 Error`;
                respBox.style.display = 'block';
                showToast('error', '❌ فشل', error.message || 'خطأ في التنفيذ');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                // تحديث الـ URL بعد التنفيذ
                updateUrlDisplay(apiId);
            }
        }

        // ──────────────────────────────────────────────────────────────
        //  🔍 SEARCH HANDLER
        // ──────────────────────────────────────────────────────────────
        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value.trim().toLowerCase();
            renderAccordion();
        });

        // ──────────────────────────────────────────────────────────────
        //  🌙 THEME TOGGLE
        // ──────────────────────────────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        let isLight = localStorage.getItem('sonic-theme') === 'light';

        function applyTheme() {
            if (isLight) {
                document.body.classList.add('light-mode');
                themeIcon.className = 'fa-regular fa-sun';
            } else {
                document.body.classList.remove('light-mode');
                themeIcon.className = 'fa-regular fa-moon';
            }
            localStorage.setItem('sonic-theme', isLight ? 'light' : 'dark');
        }
        applyTheme();

        themeToggle.addEventListener('click', () => {
            isLight = !isLight;
            applyTheme();
            showToast('info', '🎨 مظهر', isLight ? 'الوضع الفاتح' : 'الوضع الداكن');
        });

        // ──────────────────────────────────────────────────────────────
        //  📜 NAVBAR SCROLL EFFECT
        // ──────────────────────────────────────────────────────────────
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 30) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // ──────────────────────────────────────────────────────────────
        //  🚀 SPLASH SCREEN — HIDE AFTER LOAD
        // ──────────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
            }, 2000);
        });

        // ──────────────────────────────────────────────────────────────
        //  ⚡ INIT
        // ──────────────────────────────────────────────────────────────
        renderCategoryPills();
        renderAccordion();

        console.log('🚀 SONIC API Center — Cyberpunk Edition');
        console.log(`📚 ${Object.values(apisConfig).filter(a => a.status === 'active').length} APIs متاحة`);
        console.log('💡 Powered by SONIC DEV 🇲🇦');
    </script>
</body>
</html>
